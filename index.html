<!DOCTYPE html>
<html>

<head>
    <title>My Playlist</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/dialog.css" />
    <link rel="stylesheet" href="./assets/css/audio.css" />
</head>

<body>
    <div id="global-loader"
        style="display: none; justify-content: center; align-items: center; height: 100vh; position: fixed; z-index: 12;">
        <img src="./assets/images/loader_white.svg" width="100" />
        <br />
        <p id="progress" style="display: block; color: white; text-align: center; font-size: 1.3rem;"></p>
    </div>
    <div class="main">
        <header>
            <div class="player">
                <h3 id="player-title">Not playing</h3>
                <div class="player-main">
                    <div class="timeline">
                        <span class="subtitle" id="currentTime">0:00</span>
                        <input type="range" id="seekBar" value="0" min="0" max="100">
                        <span class="subtitle" id="duration">0:00</span>
                    </div>
                    <div class="controls">
                        <button id="backBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:1.7rem; height:1.7rem;">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M21 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061A1.125 1.125 0 0 1 21 8.689v8.122ZM11.25 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061a1.125 1.125 0 0 1 1.683.977v8.122Z" />
                            </svg>
                        </button>

                        <button id="playBtn" style="color: black;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 2rem; height: 2rem;">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
                            </svg>
                        </button>

                        <button id="forwardBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:1.7rem; height:1.7rem;">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061A1.125 1.125 0 0 1 3 16.811V8.69ZM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061a1.125 1.125 0 0 1-1.683-.977V8.69Z" />
                            </svg>
                        </button>
                    </div>
                    <audio id="audio-player"></audio>
                </div>
            </div>
        </header>
        <div id="playlist" class="playlist">
            <!-- -->
        </div>
    </div>
    <button class="button" id="dialog-opener">Add song</button>
    <div id="overlay" class="closed"></div>
    <div id="dialog" class="closed">
        <h2>Add song</h2>
        <div class="tabs">
            <span class="active" id="openUrl">URL</span>
            <span id="searchYt">Search youtube</span>
        </div>
        <form id="openUrlSection" class="openUrlSection">
            <input type="text" name="url" placeholder="Video url..." />
            <button class="button url-button" id="submitUrlBtn">Submit</button>
        </form>
        <div id="searchYtSection" class="searchYtSection closed">
            <div class="search-section-header">
                <input type="text" id="searchInput" placeholder="Search..." />
                <button class="button url-button" id="searchYtBtn">Search</button>
            </div>
            <img src="./assets/images/loader.svg" class="loading-img" width="60" />
            <div class="search-results" style="display: none">
            </div>
        </div>
    </div>
    <script src="./assets/js/audio.js"></script>
    <script src="./assets/js/db.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/load.js"></script>
</body>

</html>
